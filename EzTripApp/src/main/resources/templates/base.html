<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
    <head>
        <title>EzTrip System</title>
        <th:block th:fragment="css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        </th:block>
    </head>
    <body>
        <header th:fragment="header">
            <nav class="navbar navbar-expand-sm bg-dark navbar-dark">
                <div class="container-fluid">
                    <a class="navbar-brand" href="#">EzTrip Admin</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapsibleNavbar">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="collapsibleNavbar"  sec:authorize="isAuthenticated()">
                        <ul class="navbar-nav">
                            <li class="nav-item">
                                <a class="nav-link" th:href="@{/admin}">Trang chủ</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" th:href="@{/admin/users}">Quản lý người dùng</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" th:href="@{/admin/services}">Quản lý dịch vụ</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" th:href="@{/admin/stats}">Thống kê</a>
                            </li>
                            
                            <li class="nav-item">
                                <a class="nav-link" th:href="@{/logout}">Đăng xuất</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>
        
        <footer th:fragment="footer" style="position: fixed; bottom: 0; width: 100%; text-align: center;">
            <div class="alert alert-info">EzTrip System &copy; 2026</div>
        </footer>
    </body>
</html>
